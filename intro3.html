<title>恋爱测评须知</title>
<style>

.wrap{padding:20px 8px}
h2{font-size:22px;text-align:center;color:#ffd6e7;margin-bottom:16px}
.content{line-height:1.8;color:#e3c8d5;font-size:15px;margin-bottom:36px}

.start-test{

<body>
