<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>测评说明</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:PingFang SC}
        body{background:#f3effb;padding:30px 15px;min-height:100vh}
        .top-icon{width:80px;height:80px;background:#8458d8;border-radius:20px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center}
        svg{width:40px;height:40px;fill:#fff}
        h1{text-align:center;color:#412479;font-size:26px;margin-bottom:8px}
        .sub-title{text-align:center;color:#7760aa;letter-spacing:1px;margin-bottom:40px}
        .grid-box{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:500px;margin:0 auto 30px}
        .grid-item{background:#fff;padding:24px 10px;border-radius:16px;text-align:center;box-shadow:0 2px 12px #e9e2f8}
        .num{font-size:28px;color:#8458d8;font-weight:bold}
        .text{color:#555;margin-top:6px}
        .desc-card{max-width:500px;margin:0 auto;background:#fff;border-radius:16px;padding:24px;line-height:1.7;color:#444}
        .desc-card h4{margin-bottom:16px;color:#6340b4}
        .tag-item{display:flex;align-items:center;margin:14px 0;color:#555}
        .start-btn{display:block;width:100%;max-width:500px;margin:40px auto 0;background:#8458d8;color:#fff;text-align:center;line-height:60px;border-radius:12px;text-decoration:none;font-size:18px}
        .footer-txt{text-align:center;margin-top:40px;color:#999;font-size:13px}
    </style>
</head>
<body>
    <div class="top-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"></path></svg>
    </div>
    <h1>情绪内核与松弛感深度测评</h1>
    <div class="sub-title>EMOTION SOUL MATCH · 2026</div>

    <div class="grid-box">
        <div class="grid-item"><div class="num">50</div><div class="text">专业测评题目</div></div>
        <div class="grid-item"><div class="num">3分钟</div><div class="text">快速完成作答</div></div>
        <div class="grid-item"><div class="num">5大</div><div class="text">心理维度解析</div></div>
        <div class="grid-item"><div class="num">6种</div><div class="text">专属人格报告</div></div>
    </div>

    <div class="desc-card">
        <h4>测试须知</h4>
        <p>请根据你的真实下意识想法选择答案，不要刻意选择理想化选项，结果才足够精准。作答完成后，系统立刻生成详细图文报告，包含你的内耗等级、性格短板、优化建议。</p>
        <div class="tag-item">✅ 精神内耗指数检测</div>
        <div class="tag-item">✅ 高敏感共情程度评估</div>
        <div class="tag-item">✅ 人际边界感强弱分析</div>
        <div class="tag-item">✅ 深夜胡思乱想倾向打分</div>
        <div class="tag-item">✅ 讨好型人格修正方案</div>
    </div>

    <a href="test.html" class="start-btn">开始答题</a>
    <div class="footer-txt">趣味心理测评 | 仅作自我参考</div>
</body>
</html>
