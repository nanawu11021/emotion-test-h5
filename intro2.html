<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测评介绍</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:PingFang SC}
body{background:#1c1a29;color:#f1f1f1;min-height:100vh;padding:22px;max-width:640px;margin:0 auto}
.wrap{padding:20px 8px}
h2{font-size:22px;text-align:center;color:#e8dfff;margin-bottom:16px}
.content{line-height:1.8;color:#d3c8f5;font-size:15px;margin-bottom:36px}
.content p{margin:12px 0}
.start-test{
    width:100%;padding:16px;background:#8b6cd2;border:none;border-radius:12px;color:#fff;font-size:16px
}
.back{
    width:100%;padding:14px;background:#333047;color:#ccc;border:none;border-radius:12px;margin-top:14px;font-size:16px
}
</style>
</head>
<body>
<div class="wrap">
    <h2>测评须知</h2>
    <div class="content">
        <p>本次测评一共20道单选题，每题根据你的真实想法选择，结果会综合计算五大内心维度。</p>
        <p>✅ 维度1：精神内耗指数</p>
        <p>✅ 维度2：自我边界感强弱</p>
        <p>✅ 维度3：情绪自愈能力</p>
        <p>✅ 维度4：深夜焦虑程度</p>
        <p>✅ 维度5：讨好型人格倾向</p>
        <p>作答无对错之分，请凭第一直觉选择，结果更加精准。全部答完后生成完整专属人格报告。</p>
    </div>
    <button class="start-test" onclick="location.href='test.html'">开始20题测评</button>
    <button class="back" onclick="location.href='index.html'">返回首页</button>
</div>
</body>
</html>
