<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>情绪内核测评</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:PingFang SC,system-ui}
        body{background:#f3effb;padding:40px 15px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
        .lock-icon{width:100px;height:100px;background:#8458d8;border-radius:24px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
        svg{width:50px;height:50px;fill:#fff}
        h1{color:#412479;font-size:28px;margin-bottom:8px;text-align:center}
        .sub-title{color:#7760aa;letter-spacing:2px;margin-bottom:40px}
        .input-box{width:100%;max-width:420px;background:#fff;border-radius:16px;padding:30px 20px;box-shadow:0 4px 20px #e1d9f5}
        .input-tip{text-align:center;color:#6648b7;font-size:18px;margin-bottom:20px}
        .code-input{width:100%;border:1px solid #d8cff0;border-radius:12px;height:70px;text-align:center;font-size:24px;letter-spacing:12px;outline:none;padding:0 10px}
        .code-hint{text-align:center;color:#aaa;margin-top:12px;font-size:14px}
        .desc-box{width:100%;max-width:420px;background:#fff;border-radius:12px;padding:16px;margin-top:20px;color:#666;font-size:14px;line-height:1.6}
        .submit-btn{width:100%;max-width:420px;margin-top:30px;background:#8458d8;color:#fff;border:none;border-radius:12px;height:64px;font-size:18px;cursor:pointer;transition:0.2s}
        .submit-btn:hover{background:#7049bc}
        .footer-txt{margin-top:40px;color:#999;font-size:13px}
    </style>
</head>
<body>
    <div class="lock-icon">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"></path></svg>
    </div>
    <h1>女性情绪内核测评</h1>
    <div class="sub-title>EMOTION INNER · 2026</div>

    <div class="input-box">
        <div class="input-tip">🔑 请输入校验码</div>
        <input class="code-input" maxlength="4" placeholder="••••" id="pwd">
        <div class="code-hint">4位数字专属验证码</div>
    </div>

    <div class="desc-box">
        ℹ️ 测评分析精神内耗、边界感、自愈力、深夜焦虑、讨好型人格五大维度
    </div>

    <button class="submit-btn" onclick="checkPwd()">验证并开始测评</button>
    <div class="footer-txt">仅供心理趣味测评，不作为专业医疗诊断</div>

    <script>
        const rightCode = "1221"; // 可自行修改验证码
        function checkPwd(){
            let val = document.getElementById('pwd').value.trim();
            if(val === rightCode){
                // 进入前清空上次测评缓存，防止数据错乱
                localStorage.removeItem('scoreTotal');
                localStorage.removeItem('currentIndex');
                window.location.href = "intro.html";
            }else{
                alert("验证码错误，请重新输入");
            }
        }
    </script>
</body>
</html>
